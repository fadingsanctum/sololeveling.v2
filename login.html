<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SYSTEM — Hunter Gateway</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      min-height: 100vh; min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 24px);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .orb-1 {
      width: min(500px, 70vw); height: min(500px, 70vw);
      background: #0044cc;
      top: -150px; left: -150px;
      opacity: 0.11;
      animation: orbF1 10s ease-in-out infinite;
    }
    .orb-2 {
      width: min(350px, 55vw); height: min(350px, 55vw);
      background: #5500cc;
      bottom: -100px; right: -100px;
      opacity: 0.09;
      animation: orbF2 13s ease-in-out infinite;
    }
    .orb-3 {
      width: min(200px, 40vw); height: min(200px, 40vw);
      background: #00aabb;
      top: 40%; right: 8%;
      opacity: 0.07;
      animation: orbF1 8s ease-in-out infinite reverse;
    }
    @keyframes orbF1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,20px)} }
    @keyframes orbF2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-20px,-30px)} }

    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* Container */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 430px;
      animation: fadeUp 0.9s cubic-bezier(.4,0,.2,1) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .sys-header {
      text-align: center;
      margin-bottom: clamp(16px, 4vh, 28px);
    }

    .sys-alert {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 2vw, 11px);
      letter-spacing: clamp(2px, 0.5vw, 4px);
      color: rgba(0,245,255,0.45);
      margin-bottom: 10px;
      animation: textBlink 2.5s step-end infinite;
    }

    @keyframes textBlink {
      0%,100%{opacity:1} 50%{opacity:0.25}
    }

    .sys-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(22px, 6vw, 32px);
      font-weight: 900;
      letter-spacing: clamp(3px, 1vw, 7px);
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #00f5ff 35%, #0066ff 70%, #7b00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0,245,255,0.4));
      position: relative;
    }

    .sys-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(8px, 2vw, 11px);
      letter-spacing: clamp(2px, 0.5vw, 4px);
      color: rgba(0,245,255,0.5);
      margin-top: 8px;
    }

    /* Main panel */
    .auth-panel {
      background: rgba(0, 6, 18, 0.9);
      border: 1px solid rgba(0,245,255,0.3);
      padding: clamp(20px, 5vw, 36px);
      position: relative;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 50px rgba(0,245,255,0.12),
        0 0 100px rgba(0,102,255,0.07),
        inset 0 0 60px rgba(0,245,255,0.02);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    /* Corner pieces */
    .c { position: absolute; width: 32px; height: 32px; border-color: rgba(0,245,255,0.8); border-style: solid; }
    .c-tl { top:-1px; left:-1px; border-width:2px 0 0 2px; }
    .c-tr { top:-1px; right:-1px; border-width:2px 2px 0 0; }
    .c-bl { bottom:-1px; left:-1px; border-width:0 0 2px 2px; }
    .c-br { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(0,245,255,0.15);
      margin-bottom: clamp(18px, 4vw, 28px);
    }

    .tab {
      flex: 1;
      padding: clamp(8px, 2vw, 12px);
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: clamp(10px, 2.5vw, 12px);
      letter-spacing: 2px;
      cursor: pointer;
      color: rgba(0,245,255,0.35);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.25s;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab.active {
      color: var(--cyan);
      border-bottom-color: var(--cyan);
      text-shadow: 0 0 12px var(--cyan);
    }

    .tab:hover:not(.active) { color: rgba(0,245,255,0.65); }

    /* Form sections */
    .form-section { display: none; }
    .form-section.active { display: block; animation: fadeUp 0.3s ease; }

    /* Form groups */
    .form-group { margin-bottom: clamp(12px, 3vw, 18px); }

    .form-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 2vw, 11px);
      letter-spacing: 2px;
      color: rgba(0,245,255,0.55);
      display: block;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: clamp(10px, 2.5vw, 13px) 16px;
      background: rgba(0,245,255,0.02);
      border: 1px solid rgba(0,245,255,0.2);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(13px, 3vw, 14px);
      outline: none;
      transition: all 0.25s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
      min-height: 46px;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: rgba(0,245,255,0.7);
      background: rgba(0,245,255,0.05);
      box-shadow: 0 0 20px rgba(0,245,255,0.15), inset 0 0 15px rgba(0,245,255,0.03);
    }

    .form-input::placeholder { color: rgba(0,245,255,0.2); }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: clamp(12px, 3vw, 15px);
      background: linear-gradient(135deg, rgba(0,245,255,0.08), rgba(0,102,255,0.08));
      border: 1px solid rgba(0,245,255,0.6);
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 2.5vw, 13px);
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      min-height: 50px;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.12), transparent);
      transition: left 0.5s;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(0,245,255,0.16), rgba(0,102,255,0.16));
      box-shadow: 0 0 30px rgba(0,245,255,0.4);
      transform: translateY(-1px);
    }

    .btn-primary:hover::before { left: 100%; }
    .btn-primary:active { transform: translateY(0); }

    .btn-primary.loading {
      pointer-events: none;
      opacity: 0.65;
    }

    .btn-primary.loading::after {
      content: '';
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(0,245,255,0.3);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: clamp(11px, 2.5vw, 13px);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(12px, 3vw, 14px);
      font-weight: 600;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      min-height: 48px;
    }

    .btn-google:hover {
      border-color: rgba(255,255,255,0.3);
      color: #fff;
      background: rgba(255,255,255,0.06);
    }

    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: clamp(12px, 3vw, 18px) 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.2), transparent);
    }

    .divider-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: rgba(0,245,255,0.3);
      letter-spacing: 3px;
    }

    /* Forgot link */
    .forgot-link {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }

    .forgot-link a {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(0,245,255,0.4);
      text-decoration: none;
      letter-spacing: 1px;
      cursor: pointer;
      transition: color 0.2s;
      padding: 6px 0;
      display: inline-block;
    }

    .forgot-link a:hover { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

    /* Message */
    .message {
      padding: 10px 14px;
      margin-bottom: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(10px, 2.5vw, 11px);
      letter-spacing: 1px;
      display: none;
      word-break: break-word;
      border-left: 3px solid;
    }

    .message.error   { border-color: #ff4444; background: rgba(255,0,0,0.04); color: #ff6666; }
    .message.success { border-color: #00f5ff; background: rgba(0,245,255,0.04); color: var(--cyan); }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: clamp(14px, 3vw, 20px);
      padding-top: 14px;
      border-top: 1px solid rgba(0,245,255,0.08);
      flex-wrap: wrap;
      gap: 8px;
    }

    .status-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 1px;
      color: rgba(0,245,255,0.3);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
      animation: statusBlink 2s ease infinite;
    }

    @keyframes statusBlink {
      0%,100%{ opacity:1; transform:scale(1); }
      50%    { opacity:0.4; transform:scale(0.7); }
    }

    /* Responsive */
    @media (max-width: 380px) {
      body { padding: 12px; }
      .auth-panel { padding: 16px; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      body { justify-content: flex-start; padding-top: 8px; }
      .sys-header { margin-bottom: 8px; }
      .auth-panel { padding: 14px; }
      .form-group { margin-bottom: 8px; }
    }

    @media (min-width: 1400px) {
      .container { max-width: 480px; }
      .auth-panel { padding: 40px; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <div class="sys-header">
    <div class="sys-alert">⚠ SYSTEM ALERT — AUTHENTICATION REQUIRED</div>
    <div class="sys-title">SYSTEM</div>
    <div class="sys-sub">[ HUNTER REGISTRATION GATEWAY v2.0 ]</div>
  </div>

  <div class="auth-panel">
    <div class="c c-tl"></div>
    <div class="c c-tr"></div>
    <div class="c c-bl"></div>
    <div class="c c-br"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">LOGIN</div>
      <div class="tab" onclick="switchTab('register')">REGISTER</div>
    </div>

    <div id="message" class="message"></div>

    <!-- LOGIN -->
    <div class="form-section active" id="loginSection">
      <div class="form-group">
        <label class="form-label">IDENTIFIER (EMAIL)</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="hunter@system.net" autocomplete="email" inputmode="email">
      </div>
      <div class="form-group">
        <label class="form-label">ACCESS CODE</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••••" autocomplete="current-password">
      </div>
      <div class="forgot-link"><a onclick="resetPassword()">FORGOT ACCESS CODE?</a></div>
      <button class="btn-primary" id="loginBtn" onclick="login()">⬡ AUTHENTICATE</button>
      <div class="divider"><span class="divider-text">OR</span></div>
      <button class="btn-google" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        CONTINUE WITH GOOGLE
      </button>
    </div>

    <!-- REGISTER -->
    <div class="form-section" id="registerSection">
      <div class="form-group">
        <label class="form-label">HUNTER NAME</label>
        <input type="text" id="regName" class="form-input" placeholder="Enter your hunter name" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">IDENTIFIER (EMAIL)</label>
        <input type="email" id="regEmail" class="form-input" placeholder="hunter@system.net" autocomplete="email" inputmode="email">
      </div>
      <div class="form-group">
        <label class="form-label">ACCESS CODE (MIN 6 CHARS)</label>
        <input type="password" id="regPassword" class="form-input" placeholder="••••••••••" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="registerBtn" onclick="register()">⬡ CREATE HUNTER ACCOUNT</button>
      <div class="divider"><span class="divider-text">OR</span></div>
      <button class="btn-google" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        REGISTER WITH GOOGLE
      </button>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div> SYSTEM ONLINE</div>
      <div class="status-item">SECURE CONNECTION</div>
      <div class="status-item">v2.0.0</div>
    </div>
  </div>
</div>

<div id="systemFooter">
  &copy; 2026 SOLO LEVELING — AMEEN
  <span>Secure Connection Active</span>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail,
  sendEmailVerification, updateProfile, onAuthStateChanged, setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAPP2o5T7jl-9LGpVRKJripfMvdpuEEK50",
  authDomain: "soulkart-a8200.firebaseapp.com",
  projectId: "soulkart-a8200",
  storageBucket: "soulkart-a8200.firebasestorage.app",
  messagingSenderId: "715711006853",
  appId: "1:715711006853:web:b0765bca24dd583426c1ec"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

setPersistence(auth, browserLocalPersistence);

onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = 'system.html';
});

function showMessage(text, type = 'error') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = `message ${type}`;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

async function createPlayerProfile(user, displayName) {
  const userRef = doc(db, 'users', user.uid);
  const snap = await getDoc(userRef);
  if (!snap.exists()) {
    await setDoc(userRef, {
      uid: user.uid,
      name: displayName || user.displayName || 'Hunter',
      email: user.email,
      rank: 'E', level: 1, xp: 0, xpMax: 100,
      stats: { strength: 10, agility: 10, intelligence: 10, vitality: 10, perception: 10, luck: 5 },
      hp: 100, hpMax: 100, mp: 50, mpMax: 50,
      statPoints: 0,
      title: 'Ordinary Human',
      inventory: [], achievements: [], skills: [],
      quests: { daily: {}, weekly: {} },
      streak: { login: 0, lastLogin: null },
      createdAt: serverTimestamp(),
      gold: 0, totalXp: 0
    });
  }
}

window.login = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showMessage('Enter email and password');
  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');
  btn.textContent = 'AUTHENTICATING...';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    showMessage('Access granted. Redirecting...', 'success');
    setTimeout(() => window.location.href = 'system.html', 900);
  } catch (e) {
    btn.classList.remove('loading');
    btn.textContent = '⬡ AUTHENTICATE';
    const msgs = {
      'auth/invalid-credential': 'Invalid credentials. Check email/password.',
      'auth/user-not-found': 'No hunter found with this email.',
      'auth/wrong-password': 'Invalid access code.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
    };
    showMessage(msgs[e.code] || e.message);
  }
};

window.register = async function() {
  const name     = document.getElementById('regName').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!name || !email || !password) return showMessage('Fill all fields');
  if (password.length < 6) return showMessage('Password must be 6+ characters');
  const btn = document.getElementById('registerBtn');
  btn.classList.add('loading');
  btn.textContent = 'CREATING ACCOUNT...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await createPlayerProfile(cred.user, name);
    await sendEmailVerification(cred.user);
    showMessage('Hunter account created! Check email to verify.', 'success');
    setTimeout(() => window.location.href = 'system.html', 1500);
  } catch (e) {
    btn.classList.remove('loading');
    btn.textContent = '⬡ CREATE HUNTER ACCOUNT';
    const msgs = {
      'auth/email-already-in-use': 'Email already registered. Try logging in.',
      'auth/invalid-email': 'Invalid email address.',
      'auth/weak-password': 'Password too weak.',
    };
    showMessage(msgs[e.code] || e.message);
  }
};

window.googleLogin = async function() {
  try {
    const provider = new GoogleAuthProvider();
    const cred = await signInWithPopup(auth, provider);
    await createPlayerProfile(cred.user, null);
    window.location.href = 'system.html';
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') showMessage(e.message);
  }
};

window.resetPassword = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) return showMessage('Enter your email first');
  try {
    await sendPasswordResetEmail(auth, email);
    showMessage('Reset link sent to your email', 'success');
  } catch (e) { showMessage(e.message); }
};
</script>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='register'));
  });
  document.getElementById('loginSection').classList.toggle('active', tab === 'login');
  document.getElementById('registerSection').classList.toggle('active', tab === 'register');
  document.getElementById('message').style.display = 'none';
}

// Particle network
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');
let animId;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

const isMobile  = window.innerWidth < 768;
const pCount    = isMobile ? 25 : 55;
const connDist  = isMobile ? 80 : 110;
const particles = [];

for (let i = 0; i < pCount; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.35,
    vy: (Math.random() - 0.5) * 0.35,
    size: Math.random() * 1.5 + 0.4,
    opacity: Math.random() * 0.45 + 0.08
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,245,255,${p.opacity})`;
    ctx.fill();
  });

  if (!isMobile) {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
        if (d < connDist) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(0,245,255,${0.04*(1-d/connDist)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }
  animId = requestAnimationFrame(animate);
}
animate();

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 150);
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) { cancelAnimationFrame(animId); }
  else { animate(); }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.form-section.active');
    if (active?.id === 'loginSection') window.login?.();
    else window.register?.();
  }
});
</script>
</body>
