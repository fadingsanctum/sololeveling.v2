<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SYSTEM — Initialize</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #000105;
      overflow: hidden;
      width: 100%; height: 100%;
    }

    /* Ambient background glows */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: min(600px, 80vw); height: min(600px, 80vw);
      background: #0033aa;
      top: -200px; left: -200px;
      opacity: 0.12;
      animation: orbFloat1 10s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: min(400px, 60vw); height: min(400px, 60vw);
      background: #4400aa;
      bottom: -150px; right: -150px;
      opacity: 0.10;
      animation: orbFloat2 13s ease-in-out infinite;
    }
    @keyframes orbFloat1 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(40px, 30px); }
    }
    @keyframes orbFloat2 {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(-30px, -40px); }
    }

    video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 1;
    }

    /* Grid overlay on video */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Scanline on video */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
      );
    }

    /* Start screen */
    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .start-logo {
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 2.5vw, 16px);
      letter-spacing: clamp(4px, 2vw, 10px);
      color: rgba(0,245,255,0.45);
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: blink 2.5s step-end infinite;
      text-shadow: 0 0 10px rgba(0,245,255,0.3);
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }

    .start-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 8vw, 72px);
      font-weight: 900;
      letter-spacing: clamp(4px, 2vw, 12px);
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #00f5ff 40%, #0066ff 80%, #7b00ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      text-align: center;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 30px rgba(0,245,255,0.5));
    }

    .start-subtitle {
      font-family: 'Orbitron', monospace;
      font-size: clamp(9px, 2vw, 13px);
      letter-spacing: clamp(3px, 1vw, 8px);
      color: rgba(0,245,255,0.5);
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 60px;
    }

    .start-btn {
      position: relative;
      padding: clamp(14px, 3vw, 18px) clamp(30px, 6vw, 60px);
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(0,245,255,0.5);
      color: #00f5ff;
      font-family: 'Orbitron', monospace;
      font-size: clamp(11px, 2.5vw, 15px);
      font-weight: 700;
      letter-spacing: clamp(3px, 1vw, 6px);
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s;
      animation: pulse 2.5s ease-in-out infinite;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      min-height: 52px;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.12), transparent);
      transition: left 0.6s;
    }

    .start-btn:hover {
      background: rgba(0,245,255,0.08);
      border-color: #00f5ff;
      box-shadow: 0 0 40px rgba(0,245,255,0.6), inset 0 0 20px rgba(0,245,255,0.05);
      transform: translateY(-2px);
    }

    .start-btn:hover::before { left: 100%; }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 15px rgba(0,245,255,0.3); }
      50%      { box-shadow: 0 0 35px rgba(0,245,255,0.7), 0 0 60px rgba(0,102,255,0.3); }
    }

    /* Corner decorations */
    .corner {
      position: fixed;
      width: clamp(30px, 5vw, 50px);
      height: clamp(30px, 5vw, 50px);
      border-color: rgba(0,245,255,0.4);
      border-style: solid;
      z-index: 11;
      pointer-events: none;
    }
    .corner-tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    /* HUD elements */
    .hud-top {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(8px, 1.8vw, 10px);
      letter-spacing: 3px;
      color: rgba(0,245,255,0.35);
      white-space: nowrap;
      pointer-events: none;
    }

    .hud-bottom {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 12;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(8px, 1.8vw, 10px);
      letter-spacing: 2px;
      color: rgba(0,245,255,0.3);
      pointer-events: none;
    }

    .hud-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #00ff88;
      box-shadow: 0 0 6px #00ff88;
      animation: statusPulse 2s ease infinite;
      pointer-events: none;
    }

    @keyframes statusPulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* Skip button */
    #skipBtn {
      position: fixed;
      bottom: clamp(20px, 4vh, 36px);
      right: clamp(16px, 3vw, 30px);
      z-index: 20;
      color: rgba(0,245,255,0.55);
      font-family: 'Orbitron', monospace;
      font-size: clamp(9px, 2vw, 11px);
      text-transform: uppercase;
      cursor: pointer;
      letter-spacing: 2px;
      padding: 10px 18px;
      border: 1px solid rgba(0,245,255,0.25);
      background: rgba(0,0,0,0.7);
      display: none;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    #skipBtn:hover { color: #00f5ff; border-color: rgba(0,245,255,0.6); }

    /* PORTRAIT MOBILE — video fills screen naturally via object-fit cover */
    @media (max-width: 768px) and (orientation: portrait) {
      video {
        width: 100vw;
        height: 100dvh;
        object-fit: cover;
        object-position: center center;
      }
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<video id="video" playsinline webkit-playsinline></video>
<div class="grid-overlay"></div>
<div class="scanlines"></div>

<!-- Corner decorations -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- HUD top -->
<div class="hud-top">ARCHITECT SYSTEM v2.0 · SECURE CHANNEL · ENCRYPTED</div>

<!-- Start screen -->
<div id="startScreen">
  <div class="start-logo">⚠ SYSTEM ALERT — AUTHENTICATION REQUIRED</div>
  <div class="start-title">SOLO LEVELING</div>
  <div class="start-subtitle">[ ARCHITECT SYSTEM · SHADOW MONARCH PROTOCOL ]</div>
  <button class="start-btn" id="startBtn">
    ⬡ INITIALIZE SYSTEM
  </button>
</div>

<!-- HUD bottom (shown after start) -->
<div class="hud-bottom" id="hudBottom" style="display:none;">
  <div class="hud-dot"></div>
  <span>SYSTEM ONLINE</span>
  <span style="opacity:0.5">·</span>
  <span>SECURE CONNECTION</span>
  <span style="opacity:0.5">·</span>
  <span>v2.0.0</span>
</div>

<button id="skipBtn" onclick="window.location.href='login.html'">SKIP ›</button>

<div id="systemFooter">
  &copy; 2026 SOLO LEVELING — AMEEN
  <span>Secure Connection Active</span>
</div>

<script>
  const video    = document.getElementById('video');
  const startBtn = document.getElementById('startBtn');
  const startScr = document.getElementById('startScreen');
  const skipBtn  = document.getElementById('skipBtn');
  const hudBot   = document.getElementById('hudBottom');

  function startSystem() {
    // Fade out start screen
    startScr.style.transition = 'opacity 0.8s ease';
    startScr.style.opacity = '0';
    setTimeout(() => { startScr.style.display = 'none'; }, 800);

    skipBtn.style.display = 'flex';
    hudBot.style.display  = 'flex';

    const hlsSource = 'videos/intro/intro.m3u8';
    const mp4Source = 'videos/intro/intro.mp4';

    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      const hls = new Hls({ startLevel: -1, autoStartLoad: true });
      hls.loadSource(hlsSource);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => redirect());
      });
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          video.src = mp4Source;
          video.play().catch(redirect);
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = hlsSource;
      video.play().catch(() => { video.src = mp4Source; video.play().catch(redirect); });
    } else {
      video.src = mp4Source;
      video.play().catch(redirect);
    }
  }

  function redirect() { window.location.href = 'login.html'; }

  startBtn.addEventListener('click', startSystem);
  startBtn.addEventListener('touchend', (e) => { e.preventDefault(); startSystem(); });
  video.addEventListener('ended', redirect);
  video.addEventListener('error', redirect);

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') startSystem();
  });
</script>
</body>
</html>
